<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width" />
        <title>Beasties | Beast</title>

        <link rel="icon" type="image/x-icon" href="images/beast-logo.png">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

        <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

        <script src="js/beasties.js"></script>
    </head>

    <body>
        <div class="navbar navbar-expand-lg">
            <div class="container">
                 <a class="navbar-brand" href="index.html">
                    <img src="images/beast-logo.png" alt="Beast Logo" width="30" height="30" class="d-inline-block align-text-top">
                    2E @ MIT East Campus
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="beasties.html">Beasties</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="quotes.html">Quotes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="waffles.html">Waffles</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="nertz.html">Nertz</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="container">
            <div id="loading" class="spinner-border" role="status"></div>

            <div id="mainContent">
                <h1 class="mb-3">Meet the Beasties</h1>
                <div id="beastieContainer" class="row"></div>

                <h1 class="mt-4 mb-3">Alums</h1>
                <div id="alumContainer" class="row"></div>
            </div>
        </div>
    </body>

    <script>
        $('#mainContent').hide();

        for (let beastie of BEASTIES) {
            let profile = `
                <div class="col col-lg-3 col-md-4 col-sm-6 mb-4">
                    <div class="card">
                        <img src="${(beastie.headshotSrc) ? beastie.headshotSrc : 'images/beast-logo.png'}" class="rounded-circle w-75 d-block mx-auto mt-3 mb-0" alt="${beastie.name}">
                        <div class="card-body text-center">
                            <h5 class="card-title">${beastie.name}</h5>
                            <h6 class="card-subtitle text-body-secondary small">${beastie.pronouns}</h6>
                        </div>
                        <ul class="list-group list-group-flush">`

            if (beastie.year) {
                profile += `<li class="list-group-item small"><b>Year:</b> ${beastie.year}</li>`;
            }
            if (beastie.course) {
                profile += `<li class="list-group-item small"><b>Course:</b> ${beastie.course}</li>`
            }
            profile += '</ul>'
            if (beastie.bio) {
                profile += `
                        <div class="card-body">
                            <p class="card-text small">${(beastie.bio) ? `"${beastie.bio}"` : ""}</p>
                        </div>`;
            }
            profile += '</div></div>'
            profile = profile.replaceAll('<a ', '<a class="link-body-emphasis" '); // format all links the same

            if (beastie.isAlum) {
                $("#alumContainer").append(profile);
            } else {
                $("#beastieContainer").append(profile);
            }
        }

        Promise.all(
            $('img').toArray()
                .filter(img => !img.complete)
                .map(img => new Promise(resolve => {
                    $(img).one('load error', resolve);
                }))
        ).then(() => {
            $('#loading').hide();
            $('#mainContent').show();

            new Masonry('#beastieContainer').layout();
            new Masonry('#alumContainer').layout();
        });
    </script>
</html>
